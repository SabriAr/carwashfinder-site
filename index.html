<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carwash Finder - Trouve ton lavage auto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #07553B;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      animation: pageIn 0.5s ease-out;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body.leaving {
      animation: pageOut 0.35s ease-in forwards;
    }
    @keyframes pageOut {
      to { opacity: 0; transform: translateY(-12px); }
    }
    .container {
      text-align: center;
      max-width: 480px;
    }

    /* Logo float + pulse */
    .logo {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.12);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: floatUp 0.8s ease-out, float 3s ease-in-out 0.8s infinite;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(40px) scale(0.8); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Title slide in */
    h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      animation: slideIn 0.6s ease-out 0.3s both;
    }
    .tagline {
      font-size: 16px;
      opacity: 0;
      margin-bottom: 32px;
      animation: fadeIn 0.6s ease-out 0.5s forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.7; }
    }

    /* Features stagger */
    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    .feature {
      background: rgba(255,255,255,0.1);
      padding: 16px;
      border-radius: 12px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: slideRight 0.5s ease-out forwards;
      transition: transform 0.2s, background 0.2s;
      cursor: default;
    }
    .feature:hover {
      transform: translateX(6px);
      background: rgba(255,255,255,0.16);
    }
    .feature:nth-child(1) { animation-delay: 0.7s; }
    .feature:nth-child(2) { animation-delay: 0.9s; }
    .feature:nth-child(3) { animation-delay: 1.1s; }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .feature-icon { font-size: 24px; }
    .feature-text { font-size: 14px; font-weight: 600; }

    /* CTA button */
    .badge {
      display: inline-block;
      padding: 14px 28px;
      background: #000;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      opacity: 0;
      animation: popIn 0.4s ease-out 1.4s forwards;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .badge:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Links */
    .links {
      margin-top: 32px;
      display: flex;
      gap: 16px;
      justify-content: center;
      opacity: 0;
      animation: fadeIn2 0.5s ease-out 1.6s forwards;
    }
    @keyframes fadeIn2 {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .links a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .links a:hover { color: #fff; }

    /* Footer */
    footer {
      margin-top: 48px;
      font-size: 12px;
      opacity: 0;
      animation: fadeIn2 0.5s ease-out 1.8s forwards;
    }

    /* Glow particles */
    .particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: rise linear infinite;
    }
    @keyframes rise {
      from { transform: translateY(100vh) scale(1); opacity: 1; }
      90% { opacity: 1; }
      to { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    .container, footer { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="logo"><img src="icon.png" alt="Carwash Finder" style="width:80px;height:80px;border-radius:16px"></div>
    <h1>Carwash Finder</h1>
    <p class="tagline">Trouve ton lavage auto en un instant</p>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">&#x1F5FA;</span>
        <span class="feature-text">Carte interactive avec 9 500+ stations en France</span>
      </div>
      <div class="feature">
        <span class="feature-icon">&#x2B50;</span>
        <span class="feature-text">Notes Google, horaires, prix et equipements</span>
      </div>
      <div class="feature">
        <span class="feature-icon">&#x1F91D;</span>
        <span class="feature-text">Communaute active : vote, signale, ameliore</span>
      </div>
    </div>

    <a class="badge" href="#">Bientot sur l'App Store</a>

    <div class="links">
      <a href="privacy.html" class="page-link">Politique de confidentialite</a>
      <a href="support.html" class="page-link">Support</a>
    </div>
  </div>

  <footer>&copy; 2026 Sabri A. Tous droits reserves.</footer>

  <script>
    // Floating particles (only once)
    const container = document.getElementById('particles');
    if (!container.dataset.init) {
      container.dataset.init = '1';
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
        const dur = 8 + Math.random() * 12;
        p.style.animationDuration = dur + 's';
        // Start mid-animation so particles are visible immediately
        p.style.animationDelay = '-' + (Math.random() * dur) + 's';
        container.appendChild(p);
      }
    }

    // Fix back button: restore visibility instantly on bfcache
    window.addEventListener('pageshow', e => {
      if (e.persisted) {
        document.body.style.animation = 'none';
        document.body.style.opacity = '1';
        document.body.style.transform = 'none';
      }
      document.body.classList.remove('leaving');
    });

    // Page transitions
    document.querySelectorAll('.page-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const href = link.getAttribute('href');
        document.body.classList.add('leaving');
        setTimeout(() => { window.location.href = href; }, 350);
      });
    });
  </script>
</body>
</html>
